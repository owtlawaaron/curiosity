,{"c":"現代の恋愛","f":"オンラインでの誹謗中傷や、別れた相手のリベンジポルノは、若い世代の恋愛リスクとして増加している。デジタル時代の新しい暴力形態。","l":"親密な写真や情報の共有は、慎重に。「絶対大丈夫」と思える関係でも、リスクは残る。","s":"デジタル恋愛リスク","is_surprise":false},{"c":"現代の恋愛","f":"アプリで「会いに行く」前のビデオ通話は、安全確認になるだけでなく、相性の判断にも有用。声と動きで、テキストでは見えない部分が分かる。","l":"アプリで「いい感じ」になっても、会う前にビデオ通話を提案する。それを断る相手には、注意。","s":"アプリ安全策","is_surprise":false},{"c":"現代の恋愛","f":"Z世代の若者は、過去世代より「恋愛より自己実現」を重視する傾向。仕事、趣味、自分の成長を優先し、恋愛を後回しにする選択。","l":"恋愛を「人生の必須」と思わない。自分の人生のどこに位置付けるか、自分で決める。","s":"優先順位の変化","is_surprise":false},{"c":"現代の恋愛","f":"オンラインで知り合って結婚するカップルが増加し、現在は新婚カップルの30%以上がオンライン出会い。離婚率は対面出会いより低いという研究も。","l":"「アプリで出会った」を恥じない。むしろ、選択肢の中から意識的に選んだ関係の方が、安定する可能性がある。","s":"オンライン結婚","is_surprise":false},{"c":"現代の恋愛","f":"「恋愛感情を信じない」若者が増えている。「ドキドキ」を関係の判断材料にせず、「価値観の一致」「長期的な相性」で選ぶ傾向。","l":"感情だけでなく、論理でも相手を判断する。両方の視点が、賢明な選択を生む。","s":"合理的恋愛","is_surprise":false},{"c":"現代の恋愛","f":"「Slow dating」(ゆっくり関係を進める)を選ぶ若者が増えている。短期間で「告白→交際→破局」を繰り返すより、時間をかけて確認する。","l":"急がない関係を選ぶ。「すぐ付き合う」より「ゆっくり知る」方が、長期的に良い結果を生む。","s":"スローデーティング","is_surprise":false},{"c":"現代の恋愛","f":"「セラピー文化」が若い世代に広がっている。カウンセリングを受けることに抵抗が少なく、自己理解を深める文化。","l":"セラピーは「弱い人が受けるもの」ではない。自己理解への投資として、検討の価値がある。","s":"セラピー文化","is_surprise":true},{"c":"現代の恋愛","f":"アプリでのデート前、相手の名前で検索して情報を集めるのが普通になっている。「デート前リサーチ」は安全策でもあり、関係を歪める要因でもある。","l":"事前情報は最小限に。会う前に知りすぎると、先入観で関係を判断してしまう。","s":"検索とデート","is_surprise":false},{"c":"自己理解","f":"恋愛で「いつも同じパターンに陥る」のは、自分の中に未解決の問題があるサイン。相手を選んでいるようで、無意識のパターンが選ばせている。","l":"3回続けて同じような関係に終わったら、相手の問題でなく自分の問題を疑う。パターンを言語化することが第一歩。","s":"反復強迫","is_surprise":false},{"c":"自己理解","f":"「自分を愛していないと、他人も愛せない」は半分正しい。自己肯定感が極端に低い人は、健全な愛し方ができない。","l":"恋愛で苦しむなら、まず自分との関係を見直す。「自分を満たす」が、関係の土台。","s":"自己肯定感と恋愛","is_surprise":false},{"c":"自己理解","f":"恋愛中、相手の良いところに過剰に注目し、欠点を見ないのは「初期の幻想」。これは脳の自然な作用だが、長期関係では「現実の相手」を見る視点が必要。","l":"理想化が消えた時が、本当の関係の始まり。「冷めた」と決めつけず、深まる機会と捉える。","s":"理想化の脱却","is_surprise":false},{"c":"自己理解","f":"パートナーへの不満は、しばしば自分の中の「言えていない欲求」の表れ。相手が悪いのでなく、自分が伝えていない可能性がある。","l":"不満を感じたら「自分は何が欲しいのか」を先に問う。それを言葉にできれば、相手も応えやすい。","s":"投影","is_surprise":false},{"c":"自己理解","f":"親との関係パターンが、恋愛で繰り返される。「父のような人」「母とは違う人」を無意識に選ぶ。これは病的でなく、人間の普通の構造。","l":"自分の親との関係を客観視する。それが、自分の恋愛パターンを理解する鍵。","s":"内的作業モデル","is_surprise":false},{"c":"自己理解","f":"「束縛したい」気持ちは、相手を信頼していないより、自分を信頼していないことが多い。「相手に去られたら、自分は価値がない」と感じている。","l":"束縛したくなる時、自分の不安の源を探る。相手の問題ではなく、自分の課題かもしれない。","s":"自己評価と束縛","is_surprise":false},{"c":"自己理解","f":"健全な依存と不健全な依存は違う。健全は「相手を頼れる」、不健全は「相手なしで自分が機能しない」。区別が重要。","l":"パートナーを「人生の全て」にしない。自分の趣味、友人、目標を別に持つ。これが健全な依存。","s":"健全な相互依存","is_surprise":false},{"c":"自己理解","f":"恋愛初期の感覚を「永遠に続く」と思い込むのは、脳の錯覚。これを理解していると、ドキドキが消えた時に「終わった」と誤解しない。","l":"関係には段階がある。初期、安定期、深化期、それぞれ違う感覚。比較せず、今の段階を生きる。","s":"関係の段階理論","is_surprise":false},{"c":"自己理解","f":"自分の「許容範囲」と「絶対NG」を明確に持っている人は、関係を健全に保ちやすい。曖昧だと、後悔する選択をしやすい。","l":"恋愛を始める前に、自分の境界線を言葉にしておく。「これは譲れない」を3つ書き出す。","s":"バウンダリー","is_surprise":false},{"c":"自己理解","f":"恋愛が「人生の全て」になっている時、それは関係の問題でなく、自分の人生の問題かもしれない。健全な関係は、人生の一部であって、全てではない。","l":"恋愛以外の自分を育てる。仕事、趣味、友情、自己成長。バランスが、恋愛を強くする。","s":"人生のポートフォリオ","is_surprise":false},{"c":"自己理解","f":"パートナーを「変えよう」とすると関係が壊れる。変えられるのは自分だけ。自分が変わると、関係の力学が変わり、結果的に相手も変わることがある。","l":"相手を変えようとする努力を、自分を見つめる努力に変える。それが、関係を変える唯一の道。","s":"システム思考","is_surprise":false},{"c":"自己理解","f":"「自分はこういうタイプの人を好きになる」というパターンは、無意識の自己治癒の試み。「親と似た人で違う結末を作りたい」という、心の深層動機。","l":"自分の「タイプ」を疑う。タイプから外れた人に、本当の幸せがある可能性がある。","s":"反復強迫の意味","is_surprise":true},{"c":"自己理解","f":"健全な関係を築ける人ほど、「一人でも幸せ」という土台がある。寂しさから始まる関係は、依存的になりやすい。","l":"パートナーが必要な状態より、いれば嬉しい状態を作る。一人で満たされていることが、最強の前提。","s":"健全な独立","is_surprise":false},{"c":"自己理解","f":"恋愛における「直感」は、過去の経験から作られたパターン認識。だから「直感的にダメ」が、実は親に似ている健全な人だったりする。","l":"直感を全面信頼しない。理由のない違和感は、過去のトラウマの反応かもしれない。","s":"直感と過去","is_surprise":false},{"c":"自己理解","f":"関係の中で「自分を失う」感覚があったら、それは赤信号。健全な関係は、自分を強化するもので、消すものではない。","l":"パートナーといる時、より自分らしくいられるか。違うなら、関係の構造を見直す時。","s":"関係と自己","is_surprise":false},{"c":"恋愛科学","f":"カップルの長期幸福を予測する最強の要素は「友情の質」。恋愛感情より、お互いを「親友」と感じているかが重要。","l":"パートナーを「恋人」だけでなく「親友」として育てる。これが長期関係の秘密。","s":"Gottman / 友情の重要性","is_surprise":false},{"c":"恋愛科学","f":"出会ってから3〜6ヶ月で、脳の恋愛回路は落ち着く。「冷めた」と感じる時期だが、実は健全な変化。","l":"3ヶ月、半年、1年の節目を意識する。「今は移行期」と理解できれば、関係を諦めない。","s":"恋愛の段階","is_surprise":false},{"c":"恋愛科学","f":"長期関係を維持するカップルは、「一緒に新しいことを試す」頻度が高い。脳のドーパミン分泌を、新規体験で再点火する。","l":"マンネリを感じたら、新しい体験を提案する。レストラン、旅行、習い事。脳に新鮮さを与える。","s":"自己拡張理論","is_surprise":false},{"c":"恋愛科学","f":"カップルがお互いの目を90秒以上見つめると、絆ホルモンのオキシトシンが分泌され、繋がりが深まる。これは初対面でも長年のパートナーでも効く。","l":"パートナーとアイコンタクトを意識的に取る。スマホ越しの会話より、目を見る時間の方が貴重。","s":"アイコンタクト効果","is_surprise":false},{"c":"恋愛科学","f":"性的相性と感情的相性は別の脳回路で処理される。一方が完璧でも、もう一方が問題なら関係は続かない。","l":"一面だけで関係を判断しない。両面が育つよう、意識的に投資する。","s":"性と愛の分離","is_surprise":false},{"c":"恋愛科学","f":"カップルが共通の目標(家を買う、子供を育てる、起業する)を持つと、関係の満足度が上がる。「一緒に何かを作る」が、絆を強める。","l":"パートナーと「共同プロジェクト」を持つ。お互いを「同じチームのメンバー」として感じる。","s":"共通目標効果","is_surprise":false},{"c":"恋愛科学","f":"性的に活発なカップルは、そうでないカップルより、関係満足度が高い傾向。ただし「回数」より「親密度」が決定的。","l":"性的な親密性を、関係の重要な要素として育てる。話し合うことが、改善の第一歩。","s":"親密性の研究","is_surprise":false},{"c":"恋愛科学","f":"カップルが定期的にデートする関係は、結婚後も新鮮さを保ちやすい。「結婚したら終わり」でなく、「結婚してからもデート」を続ける。","l":"パートナーと定期的に「特別な時間」を作る。日常の中で、関係を新鮮に保つ仕掛け。","s":"デート文化","is_surprise":false},{"c":"恋愛科学","f":"カップルの幸せは、「お金がいくらか」より「お金の使い方が一致するか」で決まる。価値観の違いが、最も葛藤を生む。","l":"恋愛初期に、お金の使い方を話し合う。「価値観のずれ」を、深刻になる前に確認する。","s":"金銭価値観","is_surprise":false},{"c":"恋愛科学","f":"カップルが寝室を分けると、関係が悪化すると思われがちだが、実は満足度が上がることもある。睡眠の質が、感情の質を決める。","l":"「常に一緒」が愛ではない。睡眠など、別の方が良いことは別にする発想。","s":"スリープダイバース","is_surprise":true},{"c":"恋愛科学","f":"パートナーの「幸せ」を願う気持ちが強いほど、関係の質が高い。「自分のため」より「相手のため」を考える姿勢が、皮肉にも自分の幸せを増やす。","l":"パートナーの夢を真剣に応援する。それが、自分の人生も豊かにする。","s":"愛他性と幸福","is_surprise":false},{"c":"恋愛科学","f":"カップルが「お互いを驚かす」習慣がある関係は、長期的に新鮮さを保つ。小さなサプライズ(花、メッセージ、計画)が効く。","l":"パートナーを驚かすことを習慣化する。月1回でも、関係に新鮮さを供給する。","s":"サプライズ効果","is_surprise":false},{"c":"恋愛科学","f":"高齢のカップルの幸せ研究では、「日常の小さな儀式」が満足度と相関する。朝のコーヒー、夜の散歩、寝る前の挨拶など。","l":"派手なイベントより、日常の儀式を大事にする。それが、関係の土台を作る。","s":"カップル儀式","is_surprise":false},{"c":"恋愛科学","f":"パートナーが困っている時、「解決策」より「共感」を先に示すと、関係の信頼が深まる。多くの男性は解決策に走り、関係を冷やしてしまう。","l":"相手の話を聞く時、まず「それは辛いね」と感情を受け止める。アドバイスはその後。","s":"共感の優先順位","is_surprise":false},{"c":"恋愛科学","f":"カップルが「ありがとう」と頻繁に言う関係は、長期的に安定する。当たり前のことに感謝するかが、関係の質を決める。","l":"「やってもらえて当然」を捨てる。小さなことにも感謝を言葉にする。","s":"感謝の習慣","is_surprise":false},{"c":"恋愛科学","f":"恋愛中、人は「相手の理想像」と「現実の相手」のギャップに苦しむ。理想を100%求めると、誰も合格しない。","l":"相手に求める条件を「絶対」「あれば嬉しい」「気にしない」の3層に整理する。譲歩できる部分を増やす。","s":"理想と現実","is_surprise":false},{"c":"恋愛科学","f":"カップルが「お互いの友人と関係を持つ」と、絆が強まる。パートナーの世界に入ることが、関係を立体的にする。","l":"パートナーの友人を、自分の友人にする努力をする。それが、関係を深める。","s":"社会的織り込み","is_surprise":false},{"c":"恋愛科学","f":"カップルが「お互いに学び合う」関係は、長期的に持続する。一方が成長し、もう一方が止まると、距離が生まれる。","l":"パートナーと一緒に成長する。同じ本を読む、同じことを学ぶ。共通の成長が、絆を強める。","s":"共同成長","is_surprise":false},{"c":"恋愛科学","f":"関係の幸せは、相手の問題ではなく、「自分が幸せに貢献する技術」を持っているかで決まる。技術は学べる。","l":"恋愛は「相性の運」ではなく「技術と意識」。学べる側の自分を、磨き続ける。","s":"関係のスキル","is_surprise":false},{"c":"恋愛科学","f":"パートナーシップは、人類が発明した最も難しい関係形態の一つ。完璧にこなせる人はいない。だから「うまくいかない」のも当然。","l":"自分を責めすぎない。関係は元々難しいもの。少しずつ良くなれば、それで十分。","s":"関係の本質","is_surprise":false},{"c":"Z世代恋愛","f":"「片思いの相手のSNSをチェックする時間」が増えるほど、現実で告白する勇気が下がる傾向。SNSが「会わずに知った気になる」錯覚を生む。","l":"気になる人のSNSを見るより、直接話す方が、関係が進む。情報収集は逆効果になる。","s":"SNSパラドクス","is_surprise":false},{"c":"Z世代恋愛","f":"「告白」は日本独特の文化。海外では「自然に付き合っているか」が明確で、明示的な告白は少ない。グローバル時代、関係の進め方も多様化している。","l":"「告白して付き合う」だけが正解ではない。自然に深まる関係も、明確な合意がある関係も、どちらも有効。","s":"恋愛文化比較","is_surprise":false},{"c":"Z世代恋愛","f":"オンラインで知り合った相手と、実際に会った時の「ギャップ」がストレスになることがある。テキストで構築した相手像と、現実の相手が違う。","l":"アプリやSNSで深まる前に、早めに会う。ギャップを「予期される」状態にしておく。","s":"オンライン-オフライン期待値","is_surprise":true},{"c":"Z世代恋愛","f":"「フォロワー数の多い相手は浮気しやすい」傾向が、若い世代で確認されている。注目を浴びる構造が、選択肢を増やし続ける。","l":"パートナーのSNS環境を考慮する。注目を浴び続ける構造の中にいる人と、安定した関係を築くには別の努力が要る。","s":"インフルエンサー恋愛研究","is_surprise":false},{"c":"Z世代恋愛","f":"「彼氏/彼女と過ごす時間 vs 一人の時間」のバランスは、Z世代では「一人の時間も大事」が主流。常に一緒は、若い世代では「重い」と感じられる。","l":"パートナーシップは「個人の時間を尊重する」前提で築く。「いつも一緒」を求めると、関係が窮屈になる。","s":"独立志向","is_surprise":false},{"c":"Z世代恋愛","f":"高校生・大学生の恋愛は、卒業や就職で物理的に離れるリスクが高い。長期視点で「変化に強い関係」を作るスキルが求められる。","l":"環境変化(進学、就職、引越し)を見越して、関係の在り方を話し合う。「変わらない」ではなく「変化に対応する」関係を目指す。","s":"若年層関係の現実","is_surprise":false},{"c":"Z世代恋愛","f":"「インスタで彼氏/彼女を載せるか問題」は、若い世代特有の葛藤。プライベートを公開するか、隠すかで、価値観のずれが生まれる。","l":"SNSへの掲載は、価値観の問題。事前に話し合う。「載せたい派」と「載せたくない派」のずれは大きい。","s":"SNS公開度","is_surprise":false},{"c":"Z世代恋愛","f":"「Snapchat的な瞬間性」と「Instagram的な永続性」、両方の関係構築スタイルがある。どちらが自分に合うかは、性格による。","l":"自分が「記録派」か「瞬間派」かを知る。それに合うコミュニケーション習慣を作る。","s":"デジタル親密性","is_surprise":false},{"c":"Z世代恋愛","f":"「LINEの返信時間」を気にする若者は多いが、それで関係を判断するのは合理的でない。相手の性格、忙しさ、習慣により、返信時間は大きく変わる。","l":"返信時間を「愛のメーター」にしない。実際に会った時の質を、判断材料にする。","s":"既読既未読の罠","is_surprise":false},{"c":"Z世代恋愛","f":"「マッチングアプリで真剣な相手は見つかるか」は、よく議論される問題。データは「アプリ経由の結婚率が増加中」を示し、もはや「真剣な相手も見つかる場所」になっている。","l":"アプリの「カジュアル印象」を疑う。真剣な人も、アプリを使う時代。","s":"アプリ結婚率","is_surprise":false},{"c":"Z世代恋愛","f":"「年の差恋愛」は、Z世代では「あり」と考える割合が増えている。価値観の一致が、年齢より重視される傾向。","l":"年齢にとらわれない。価値観、コミュニケーション、目標の一致を優先する。","s":"年齢観の変化","is_surprise":false},{"c":"Z世代恋愛","f":"「同性愛・両性愛・全性愛」など、性的指向の多様性が若い世代で広く受け入れられている。自分の性的指向を探る若者も増えている。","l":"自分の性的指向に「決まった枠」を当てはめない。柔軟に、自分が誰を愛するかを観察する。","s":"性的多様性","is_surprise":false},{"c":"Z世代恋愛","f":"「結婚しない選択」を選ぶ若者が増加。これは「恋愛しない」ではなく、「結婚という形式を選ばない」ということ。長期的なパートナーシップは別にある場合も。","l":"結婚=幸せの形、という単純化を捨てる。自分が望む関係の形を、自分で定義する。","s":"結婚観の変化","is_surprise":false},{"c":"Z世代恋愛","f":"高校・大学のキャンパスでの「あの子可愛い」「あの先輩かっこいい」的な恋愛は、SNSで「ネット越しの恋愛」に置き換わりつつある。物理的距離と心理的距離が逆転している。","l":"物理的に近い人だけが「身近」ではない。SNS越しの相手も、本物の関係になる時代。","s":"物理-心理距離","is_surprise":false},{"c":"Z世代恋愛","f":"「親に紹介する」タイミングは、Z世代では遅くなる傾向。「結婚を意識した時」まで紹介しない人が増えている。","l":"親への紹介を急がない。それぞれの関係の中で、最適なタイミングを話し合う。","s":"親と恋愛","is_surprise":false},{"c":"Z世代恋愛","f":"アニメ・マンガ・ゲームの「2次元への愛」は、現実の関係を否定するのでなく、別の形の感情体験として理解されつつある。「リアルが全て」は古い価値観。","l":"自分や相手の「2次元への愛」を否定しない。感情のチャンネルは、多様にあって良い。","s":"2.5次元文化","is_surprise":true},{"c":"Z世代恋愛","f":"「グループデート」は、Z世代で復活している。1対1の重さを避け、複数で会うことで、関係をゆっくり始める文化。","l":"いきなり1対1にこだわらない。グループで会うことから始めるのも、安全で楽しい関係の作り方。","s":"グループ社交","is_surprise":false},{"c":"Z世代恋愛","f":"「恋愛の話を友達としすぎる」と、関係が脆くなる傾向。第三者の意見が、自分とパートナーの間に入り込み、関係を歪める。","l":"恋愛の話は、信頼できる少数の人にだけ。SNSで広く話すと、関係が外部の評価に振り回される。","s":"恋愛と社交網","is_surprise":false},{"c":"Z世代恋愛","f":"「失恋ソング」「失恋映画」を見て泣くことは、回復を助ける。感情を表出させる行為が、脳の処理を進める。","l":"失恋した時、感情を抑えない。泣くこと、悲しむことが、回復への正しい道。","s":"感情処理","is_surprise":false},{"c":"Z世代恋愛","f":"「アプリで知り合った人と現実の友達」を分けて考える若者が多い。SNSの世界とリアルの世界、別の関係性のレイヤーとして使い分ける。","l":"関係を「現実」「オンライン」と二分しない。両方を行き来する関係の作り方を、意識的にデザインする。","s":"複層的関係性","is_surprise":false}];
const GLOSSARY = {"安定型":{"title":"安定型 (Secure)","subtitle":"人口の約50%","trait":"「自分は愛されるに値する、他人は信頼できる」という基本前提を持つ。葛藤が起きても話し合いで解決でき、独立も依存もバランスよくこなす。","love":"感情を素直に表現し、相手の感情も受け止められる。喧嘩しても修復が早い。「重い」「軽い」と評されにくい。長期関係で最も幸せになりやすいタイプ。","tips":"もし自分が違うスタイルでも、安定型と関係を築くことで「earned secure」になれる。安全な関係を経験することが、自分の変化を生む。"},"不安型":{"title":"不安型 (Anxious)","subtitle":"人口の約20%","trait":"「相手に見捨てられるのでは」という不安が強く、関係の確認を頻繁にする。愛されたい欲求が強い分、相手の小さな変化に敏感。","love":"返信速度、態度の変化、SNSの行動などに過敏。詰め寄ると相手が逃げ、それがさらに不安を強める悪循環に入りやすい。回避型に惹かれる傾向。","tips":"確認しても不安は消えない。自分を落ち着かせる仕組み(運動、瞑想、書き出し)を持つ。返信時間を「愛のメーター」にしない練習。"},"回避型":{"title":"回避型 (Avoidant)","subtitle":"人口の約25%","trait":"「親しくなりすぎると自由を失う」と感じ、関係が深まると距離を取る。「忙しい」「一人の時間が欲しい」が口癖。冷たく見えるが、本人も葛藤している。","love":"深い感情の話を避け、相手の不満を「重い」と感じやすい。離れている時は会いたいが、いざ会うと距離を取りたくなる。不安型を「ちょうどいい距離感」と感じてしまう。","tips":"「距離を取りたい」気持ちを「個人時間」として正当化する。同時に、相手にも「あなたの時間も大事」と伝えることで、関係が安定する。"},"恐れ型":{"title":"恐れ型 (Disorganized)","subtitle":"人口の約5%","trait":"「親しくなりたい、でも怖い」という矛盾を抱える。近づくと逃げ、離れると追う。最も不安定なスタイル。トラウマ経験がある場合に多い。","love":"関係が深まる瞬間に、急に冷たくなったり、別れたいと言ったりする。本人も自分の行動が理解できないことが多い。","tips":"一人で乗り越えようとせず、カウンセリングや専門家の支援を選択肢に。スタイルは変えられる。"},"INFP":{"title":"INFP - 仲介者","subtitle":"理想主義的なロマンチスト","trait":"深い内的世界を持ち、自分の価値観に忠実。創造的で、繊細な感受性を持つ。人口の約4%。","love":"理想の愛を強く求める。深い感情的繋がりを最重視し、表面的な関係に満足できない。相手に過剰な理想を投影し、「これは違う」と感じやすい。","tips":"理想を持つのは美しいが、現実の不完全な相手を愛する練習が、本当の成長になる。「100%でなくてもいい」と自分に許可する。"},"INFJ":{"title":"INFJ - 提唱者","subtitle":"最も希少なタイプ","trait":"人口の1〜2%。深い洞察力と直観を持ち、人の本質を見抜く。理想を追求し、自分の使命を求める。","love":"「魂のパートナー」を求める傾向が強く、出会いの基準が高い。妥協を嫌い、長く独身でいることも。深く愛するが、自分の感情を表現するのは苦手。","tips":"完璧な相手を求めすぎず、現実の人間と関係を築く中で、自分の理想自体が成熟することを許す。"},"INTJ":{"title":"INTJ - 建築家","subtitle":"戦略的なビジョナリー","trait":"長期的な視点と論理的思考を持つ。独立心が強く、自分の計画通りに進める。感情よりロジック。","love":"戦略的に相手を選ぶ。「この人と長期的に成長できるか」が基準。感情表現は苦手だが、選んだ相手には深くコミット。派手な愛情表現は期待できない。","tips":"INTJに愛されたら、それは論理的に選ばれた結果。「もっと愛して」と求めるより、行動の中の愛を見る。"},"INTP":{"title":"INTP - 論理学者","subtitle":"思考の探求者","trait":"抽象的な概念を愛し、論理的整合性を求める。社交は苦手だが、知的な対話には情熱を持つ。","love":"恋愛そのものに不器用。論理で考えすぎて、感情的な瞬間を逃す。ただし一度信頼すると、深く誠実な関係を築く。","tips":"INTPの「考えすぎて行動できない」は欠点でなく特性。気長に待つ価値がある。"},"ENFP":{"title":"ENFP - 運動家","subtitle":"可能性の探求者","trait":"創造的で熱意があり、新しい体験を愛する。人との繋がりを大事にし、感情豊か。","love":"恋愛初期にもっとも輝く。「運命の人」と感じやすいが、その情熱は持続が難しい。「日常」に入ると退屈を感じ、関係を疑い始める。","tips":"「初期の魔法」を関係の指標にしない訓練が必要。落ち着いた関係の中の小さな新鮮さに目を向ける。"},"ENFJ":{"title":"ENFJ - 主人公","subtitle":"カリスマ的なリーダー","trait":"他人の成長を引き出すのが得意。社交的で、人々を結びつける。共感力が高い。","love":"「相手の成長」を愛する。パートナーが夢を追うのを支援することに喜びを感じる。一方で「自分のニーズ」を後回しにしすぎる傾向。","tips":"尽くしすぎないこと。自分の夢や欲求も、関係の中で表現する。"},"ENTP":{"title":"ENTP - 討論者","subtitle":"知的な挑戦者","trait":"新しいアイデアと議論を愛する。型にはまることを嫌い、常に新しい可能性を探る。","love":"議論好きで、パートナーとも知的な議論を楽しむ。相手にとっては「攻撃されている」と感じることも。退屈を最も嫌う。","tips":"ENTPの議論は愛情表現の一つ。知的好奇心を共有できるパートナーが必要。"},"ENTJ":{"title":"ENTJ - 指揮官","subtitle":"天性のリーダー","trait":"目標達成への意志が強く、効率を重視する。決断力と実行力を持つ。感情より結果。","love":"明確で力強いリーダーシップで関係を引っ張るが、感情の機微を見落としがち。「結果」を求め、デートも「次に繋がるか」を意識する。","tips":"ENTJと付き合うなら、感情は言葉で明確に。「察してほしい」は通じない。"},"ISFJ":{"title":"ISFJ - 擁護者","subtitle":"献身的な保護者","trait":"他人の小さなニーズに気づき、静かに尽くす。伝統と安定を愛する。自分のことは後回し。","love":"最も献身的なタイプの一つ。パートナーの好みを覚え、静かに尽くす。ただし自分の不満は口に出さず、ある日突然爆発することがある。","tips":"ISFJの愛は見えにくい。気づいて言葉で感謝するだけで、関係の質が変わる。"},"ISTJ":{"title":"ISTJ - 管理者","subtitle":"実直な実務家","trait":"責任感が強く、約束を守る。伝統と秩序を重視。感情表現は控えめだが、深い忠誠心を持つ。","love":"最も浮気しないタイプとされる。一度コミットすると、論理的・道徳的にそれを破ることを嫌う。安定の代名詞。","tips":"派手ではないが揺るがない。「燃え上がる」を期待すると違うが、「続く」を求めるなら最強。"},"ESFJ":{"title":"ESFJ - 領事官","subtitle":"社交的な世話役","trait":"人々の調和を大事にし、社会的な繋がりを育てる。他人の感情に敏感で、サポート上手。","love":"「みんな仲良く」を最も大事にする。パートナーが家族や友人に受け入れられるかを重視。「自分たちだけの愛」より「集団の中の愛」。","tips":"ESFJと付き合うなら、その人の周囲とも良い関係を築く。それが関係の安定に直結する。"},"ESTJ":{"title":"ESTJ - 幹部","subtitle":"実践的なリーダー","trait":"実用的で組織的。明確なルールと役割を好む。責任感が強く、伝統的な価値観を持つ。","love":"伝統的で安定志向。「結婚→家庭→子供」のような順序を大事にする。パートナーにも明確な役割と方向性を求める傾向。","tips":"ESTJと付き合うなら、関係の「次のステップ」を明確にする。曖昧な状態はストレスになる。"},"ISFP":{"title":"ISFP - 冒険家","subtitle":"感性の芸術家","trait":"感覚的で、美と自然を愛する。価値観に従って静かに生きる。深い内的世界を持つ。","love":"愛情を静かに、深く感じる。派手な表現はしないが、内側では激しく愛している。誤解されやすい愛し方。","tips":"ISFPの「静かさ」は無関心ではない。日常の小さな気遣いに、深い愛が込められている。"},"ISTP":{"title":"ISTP - 巨匠","subtitle":"実用的な問題解決者","trait":"手を動かして問題を解決する。論理的だが、感情を言葉にするのは苦手。独立心が強い。","love":"感情を言葉にするのが最も苦手なタイプの一つ。愛情は行動(修理してくれる、一緒にいてくれる)で示す。「愛してる」を言わせようとすると関係が壊れる。","tips":"愛は言葉だけではない。行動で愛を示すタイプを「冷たい」と判断しない。"},"ESFP":{"title":"ESFP - エンターテイナー","subtitle":"今を生きる楽天家","trait":"楽しいことが大好きで、エネルギッシュ。即興と感覚を重視し、計画より体験を選ぶ。","love":"デートを楽しく演出するのが得意。一方で「将来の計画」「真剣な話」を避ける傾向。","tips":"ESFPと長期関係を望むなら、深い話を「楽しい雰囲気」の中に混ぜる工夫が要る。重く構えると逃げられる。"},"ESTP":{"title":"ESTP - 起業家","subtitle":"アクション派","trait":"リスクを楽しみ、即興と実行を重視する。エネルギッシュで、退屈を嫌う。","love":"アクション派のデート。レストランより冒険を、座って話すより一緒に動くことを好む。","tips":"ESTPと深まりたいなら、レストランより冒険に誘う。動きの中で関係が深まるタイプ。"}};

const FEEDBACK_OPTIONS = [
  '興味深い','使えそう','面白い',
  '興味深くない','使えなさそう','おもんない','どちらでもない'
];
const POSITIVE_FB = new Set(['興味深い','使えそう','面白い']);
const NEGATIVE_FB = new Set(['興味深くない','使えなさそう','おもんない']);

// State per mode
let state = {
  human: {seen:[], history:[], prefs:{}, currentIdx:-1},
  love: {seen:[], history:[], prefs:{}, currentIdx:-1}
};
let currentMode = null;
let FACTS = null;

function startMode(mode){
  currentMode = mode;
  FACTS = (mode === 'human') ? HUMAN_FACTS : LOVE_FACTS;
  
  document.getElementById('start-screen').style.display = 'none';
  const mainView = document.getElementById('main-view');
  mainView.classList.add('active');
  mainView.classList.toggle('love-mode', mode === 'love');
  
  const logo = document.getElementById('logo');
  logo.classList.remove('human', 'love');
  logo.classList.add(mode);
  
  renderFeedback();
  nextFact();
}

function goHome(){
  document.getElementById('start-screen').style.display = 'flex';
  document.getElementById('main-view').classList.remove('active');
  document.getElementById('history-list').classList.remove('visible');
  document.getElementById('history-arrow').textContent = '▾';
  // resetを行わない - 戻ってきた時の状態を保持
}

function pickNext(){
  const s = state[currentMode];
  const remaining = [];
  for(let i=0;i<FACTS.length;i++){
    if(!s.seen.includes(i)) remaining.push(i);
  }
  if(remaining.length === 0){
    s.seen = [];
    return pickNext();
  }
  
  const wantSurprise = Math.random() < 0.10;
  if(wantSurprise){
    const surpriseList = remaining.filter(i => FACTS[i].is_surprise);
    if(surpriseList.length > 0){
      return surpriseList[Math.floor(Math.random()*surpriseList.length)];
    }
  }
  
  const weights = remaining.map(i => {
    const f = FACTS[i];
    const score = s.prefs[f.c] || 0;
    let w = Math.pow(1.5, score);
    return Math.max(0.2, Math.min(5, w));
  });
  const total = weights.reduce((a,b)=>a+b, 0);
  let r = Math.random() * total;
  for(let i=0;i<remaining.length;i++){
    r -= weights[i];
    if(r <= 0) return remaining[i];
  }
  return remaining[remaining.length-1];
}

function renderFeedback(){
  const wrap = document.getElementById('fb-buttons');
  wrap.innerHTML = '';
  FEEDBACK_OPTIONS.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'fb-btn';
    b.textContent = opt;
    b.onclick = () => selectFeedback(opt, b);
    wrap.appendChild(b);
  });
}

function selectFeedback(opt, btn){
  document.querySelectorAll('.fb-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  
  const s = state[currentMode];
  if(s.currentIdx < 0) return;
  const cat = FACTS[s.currentIdx].c;
  
  if(POSITIVE_FB.has(opt)){
    s.prefs[cat] = (s.prefs[cat] || 0) + 1;
  } else if(NEGATIVE_FB.has(opt)){
    s.prefs[cat] = (s.prefs[cat] || 0) - 1;
  }
  
  if(s.history.length > 0 && s.history[s.history.length-1].idx === s.currentIdx){
    s.history[s.history.length-1].feedback = opt;
  }
  renderHistory();
}

// Parse fact text with ｛term｝ markers, convert to clickable spans
function parseFactText(text){
  // Replace ｛term｝ with <span class="term" data-term="term">term</span>
  return text.replace(/｛([^｝]+)｝/g, (m, term) => {
    if(GLOSSARY[term]){
      return `<span class="term" onclick="showPopup('${term}')">${term}</span>`;
    }
    return term; // No glossary entry, just remove brackets
  });
}

function showPopup(term){
  const entry = GLOSSARY[term];
  if(!entry) return;
  document.getElementById('popup-title').textContent = entry.title;
  document.getElementById('popup-sub').textContent = entry.subtitle;
  document.getElementById('popup-trait').textContent = entry.trait;
  document.getElementById('popup-love').textContent = entry.love;
  document.getElementById('popup-tips').textContent = entry.tips;
  
  const popup = document.getElementById('popup');
  popup.classList.toggle('love-popup', currentMode === 'love');
  
  document.getElementById('popup-bg').classList.add('visible');
}

function closePopup(event){
  if(event && event.target.id !== 'popup-bg' && event.currentTarget.id !== 'popup-bg' && !event.target.classList.contains('popup-close')) return;
  document.getElementById('popup-bg').classList.remove('visible');
}

async function streamFactText(text, speed){
  const el = document.getElementById('fact-text');
  el.innerHTML = '';
  // Strip ｛｝ for streaming, then replace at end
  const plainText = text.replace(/[｛｝]/g, '');
  for(let i=0;i<plainText.length;i++){
    el.textContent = plainText.slice(0, i+1);
    await new Promise(r=>setTimeout(r, speed));
  }
  // Final: replace with marked version
  el.innerHTML = parseFactText(text);
}

function nextFact(){
  const card = document.getElementById('card');
  const feedback = document.getElementById('feedback');
  const lesson = document.getElementById('lesson');
  
  card.style.opacity = '0';
  feedback.classList.remove('visible');
  lesson.classList.remove('visible');
  
  setTimeout(()=>{
    const s = state[currentMode];
    const idx = pickNext();
    s.currentIdx = idx;
    s.seen.push(idx);
    const f = FACTS[idx];
    
    if(f.is_surprise) card.classList.add('surprise');
    else card.classList.remove('surprise');
    
    document.getElementById('category').textContent = f.c;
    document.getElementById('fact-text').innerHTML = '';
    document.getElementById('lesson').textContent = '';
    document.getElementById('source').textContent = '';
    document.querySelectorAll('.fb-btn').forEach(b=>b.classList.remove('selected'));
    
    document.getElementById('counter').textContent = `${s.seen.length} / ${FACTS.length}`;
    card.style.opacity = '1';
    
    streamFactText(f.f, 14).then(()=>{
      document.getElementById('lesson').textContent = '→ ' + f.l;
      lesson.classList.add('visible');
      document.getElementById('source').textContent = '— ' + f.s;
      setTimeout(()=>feedback.classList.add('visible'), 200);
    });
    
    s.history.push({idx: idx, feedback: null});
    renderHistory();
  }, 350);
}

function renderHistory(){
  const s = state[currentMode];
  const list = document.getElementById('history-list');
  if(s.history.length === 0){
    list.innerHTML = '<div style="font-size:10px;color:#444;">まだ履歴がありません</div>';
    return;
  }
  const items = s.history.slice().reverse().slice(0, 30).map(h => {
    const f = FACTS[h.idx];
    const fb = h.feedback ? `<span class="h-fb">${h.feedback}</span>` : '';
    const plainFact = f.f.replace(/[｛｝]/g, '');
    return `<div class="history-item"><span class="h-cat">${f.c}</span>${fb}<br>${plainFact.slice(0,50)}...</div>`;
  }).join('');
  list.innerHTML = items;
}

function toggleHistory(){
  const list = document.getElementById('history-list');
  const arrow = document.getElementById('history-arrow');
  list.classList.toggle('visible');
  arrow.textContent = list.classList.contains('visible') ? '▴' : '▾';
  renderHistory();
}

function resetSeen(){
  if(confirm('このモードの履歴をリセットして最初からやり直しますか?')){
    state[currentMode] = {seen:[], history:[], prefs:{}, currentIdx:-1};
    document.getElementById('counter').textContent = `0 / ${FACTS.length}`;
    nextFact();
  }
}
</script>
</body>
</html>
